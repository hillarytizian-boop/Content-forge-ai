<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Group Bot 🚀</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fab fa-whatsapp"></i> WhatsApp Group Bot</h1>
            <div class="status" id="status">
                <span class="status-icon" id="statusIcon">⏳</span>
                <span id="statusText">Not connected</span>
            </div>
        </header>

        <div class="card login-section" id="loginSection">
            <h3><i class="fas fa-sign-in-alt"></i> Step 1: Login</h3>
            <p>Click login and scan QR code at <code id="qrUrl"></code></p>
            <button class="btn btn-primary" onclick="login()">
                <i class="fas fa-qrcode"></i> Login to WhatsApp
            </button>
        </div>

        <div class="cards-grid" id="botSection" style="display: none;">
            <!-- Create Group Card -->
            <div class="card">
                <h3><i class="fas fa-users"></i> Create Group</h3>
                <div class="form-group">
                    <label>Group Name</label>
                    <input type="text" id="groupName" placeholder="Marketing Team 2024">
                </div>
                <div class="form-group">
                    <label>Members (phone numbers or names, one per line)</label>
                    <textarea id="participants" rows="4" 
                        placeholder="+1234567890&#10;John Doe&#10;+1987654321"></textarea>
                </div>
                <button class="btn btn-success" onclick="createGroup()">
                    <i class="fas fa-plus"></i> Create Group
                </button>
            </div>

            <!-- Add Members Card -->
            <div class="card">
                <h3><i class="fas fa-user-plus"></i> Add Members</h3>
                <div class="form-group">
                    <label>Group Name</label>
                    <input type="text" id="targetGroup" placeholder="Marketing Team 2024">
                </div>
                <div class="form-group">
                    <label>New Members (one per line)</label>
                    <textarea id="newMembers" rows="4" 
                        placeholder="Jane Smith&#10;+1555123456&#10;Bob Wilson"></textarea>
                </div>
                <button class="btn btn-warning" onclick="addMembers()">
                    <i class="fas fa-user-plus"></i> Add Members
                </button>
            </div>
        </div>

        <div class="logs" id="logs">
            <h4><i class="fas fa-list"></i> Activity Log</h4>
            <div id="logContent"></div>
        </div>

        <div class="actions">
            <button class="btn btn-danger" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
            <button class="btn btn-secondary" onclick="clearLog()">
                <i class="fas fa-trash"></i> Clear Log
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
