<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentForge AI Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff}
.container{max-width:1100px;margin:auto;padding:20px}
.btn{padding:10px 20px;border:none;border-radius:6px;cursor:pointer}
.gold{background:#D4AF37;color:#000}
.hidden{display:none}
.card{background:#161616;padding:20px;border-radius:10px;margin-top:20px}
input,select{width:100%;padding:10px;margin-top:10px;background:#222;color:#fff;border:1px solid #444}
video{width:100%;margin-top:15px;border-radius:10px}
.sidebar button{display:block;width:100%;margin:5px 0}
</style>
</head>

<body>

<div class="container">

<h1>ContentForge <span style="color:#D4AF37">AI Pro</span></h1>

<!-- AUTH -->
<div id="authBox" class="card">
<h3 id="authTitle">Login</h3>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button class="btn gold" onclick="auth()">Submit</button>

<p onclick="toggleAuth()" style="cursor:pointer;margin-top:10px">
Switch to Signup
</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h3 id="welcome"></h3>

<div class="sidebar">
<button onclick="showTab('content')">Content</button>
<button onclick="showTab('video')">Video</button>
<button onclick="showTab('share')">Share</button>
<button onclick="logout()">Logout</button>
</div>

<!-- CONTENT -->
<div id="content" class="card">
<h3>Generate Content</h3>

<input id="topic" placeholder="Topic">
<select id="type">
<option value="tiktok">TikTok</option>
<option value="instagram">Instagram</option>
<option value="youtube">YouTube</option>
</select>

<button class="btn gold" onclick="genContent()">Generate</button>

<p id="contentOut"></p>
</div>

<!-- VIDEO -->
<div id="video" class="card hidden">
<h3>Generate Video</h3>

<input id="videoTopic" placeholder="Keyword">

<button class="btn gold" onclick="genVideo()">Generate Video</button>

<video id="player" controls></video>
<p id="videoSrc"></p>
</div>

<!-- SHARE -->
<div id="share" class="card hidden">
<h3>Share & Earn</h3>

<button onclick="shareWhats()">WhatsApp</button>
<button onclick="shareTele()">Telegram</button>
<button onclick="copyLink()">Copy Link</button>

<p id="shareMsg"></p>
</div>

</div>

</div>

<script>

const apo = "https://content-forge-ai.onrender.com";

let isLogin = true;

/* AUTH */
function toggleAuth(){
isLogin = !isLogin;
document.getElementById('authTitle').innerText = isLogin ? "Login" : "Signup";
}

async function auth(){
const email = document.getElementById('email').value;
const password = document.getElementById('password').value;

const url = isLogin ? "/api/login" : "/api/signup";

const res = await fetch(apo + url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(res.ok){
localStorage.setItem("user",JSON.stringify(data.user));
startApp();
alert("✅ Success");
}else{
alert(data.message);
}
}

/* START APP */
function startApp(){
document.getElementById("authBox").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

const user = JSON.parse(localStorage.getItem("user"));
document.getElementById("welcome").innerText = "Hello " + user.email;
}

/* LOGOUT */
function logout(){
localStorage.removeItem("user");
location.reload();
}

/* TABS */
function showTab(tab){
document.getElementById("content").classList.add("hidden");
document.getElementById("video").classList.add("hidden");
document.getElementById("share").classList.add("hidden");

document.getElementById(tab).classList.remove("hidden");
}

/* CONTENT */
async function genContent(){
const topic = document.getElementById("topic").value;
const type = document.getElementById("type").value;

const res = await fetch(apo + "/api/generate-content",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({topic,type})
});

const data = await res.json();

document.getElementById("contentOut").innerText = data.content;
}

/* VIDEO */
async function genVideo(){
const query = document.getElementById("videoTopic").value;

const res = await fetch(apo + "/api/generate-video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query})
});

const data = await res.json();

document.getElementById("player").src = data.videoUrl;
document.getElementById("videoSrc").innerText = data.source;
}

/* SHARE */
function getRef(){
const user = JSON.parse(localStorage.getItem("user"));
return window.location.origin + "?ref=" + user.id;
}

function shareWhats(){
window.open(`https://wa.me/?text=Use this AI tool: ${getRef()}`);
}

function shareTele(){
window.open(`https://t.me/share/url?url=${getRef()}`);
}

function copyLink(){
navigator.clipboard.writeText(getRef());
document.getElementById("shareMsg").innerText = "Link copied!";
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
startApp();
}

</script>

</body>
</html>
