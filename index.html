<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentForge AI Pro</title>

<style>
body{margin:0;font-family:Arial;background:#0a0a0a;color:#fff}
.container{max-width:1200px;margin:auto;padding:20px}
.btn{padding:10px 20px;border-radius:6px;border:none;cursor:pointer}
.gold{background:#D4AF37;color:#000}
.hidden{display:none}
.card{background:#161616;padding:20px;border-radius:10px;margin-top:20px}
input,select{width:100%;padding:10px;margin-top:10px;background:#222;color:#fff;border:1px solid #444}
video{width:100%;margin-top:15px;border-radius:10px}
.nav{display:flex;justify-content:space-between;align-items:center;padding:15px;border-bottom:1px solid #333}
.sidebar button{display:block;width:100%;margin:5px 0}
.hero{text-align:center;padding:60px}
</style>
</head>

<body>

<div class="nav">
<h2>ContentForge <span style="color:#D4AF37">AI Pro</span></h2>
<button id="loginBtn" class="btn gold">Login</button>
</div>

<div class="container">

<!-- HERO -->
<div class="hero">
<h1>Generate Viral Content & Videos</h1>
<p>AI-powered TikTok, YouTube & Instagram generator</p>
<button class="btn gold" onclick="openDashboard()">Start Creating</button>
</div>

<!-- AUTH MODAL -->
<div id="authModal" class="hidden card">
<h3 id="authTitle">Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="btn gold" onclick="auth()">Submit</button>
<p onclick="toggleAuth()" style="cursor:pointer">Switch Mode</p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">

<h3 id="welcome"></h3>

<div class="sidebar">
<button onclick="tab('content')">Content</button>
<button onclick="tab('video')">Video</button>
<button onclick="tab('share')">Share</button>
<button onclick="logout()">Logout</button>
</div>

<!-- CONTENT -->
<div id="contentTab" class="card">
<h3>Content Generator</h3>

<input id="topic" placeholder="Topic">
<select id="type">
<option value="tiktok">TikTok</option>
<option value="instagram">Instagram</option>
<option value="youtube">YouTube</option>
</select>

<button class="btn gold" onclick="genContent()">Generate</button>

<p id="contentOut"></p>
</div>

<!-- VIDEO -->
<div id="videoTab" class="card hidden">
<h3>Video Generator</h3>

<input id="videoTopic" placeholder="Keyword">

<button class="btn gold" onclick="genVideo()">Generate Video</button>

<video id="player" controls></video>
<p id="videoSrc"></p>
</div>

<!-- SHARE -->
<div id="shareTab" class="card hidden">
<h3>Share & Earn</h3>

<button onclick="shareWhats()">WhatsApp</button>
<button onclick="shareTele()">Telegram</button>
<button onclick="copyLink()">Copy Link</button>

<p id="shareMsg"></p>
</div>

</div>

</div>

<script>

const apo = "https://content-forge-ai.onrender.com";

let isLogin = true;

/* UI */
document.getElementById("loginBtn").onclick = ()=>{
document.getElementById("authModal").classList.toggle("hidden");
};

function openDashboard(){
if(localStorage.getItem("user")){
startApp();
}else{
document.getElementById("authModal").classList.remove("hidden");
}
}

/* AUTH */
function toggleAuth(){
isLogin = !isLogin;
document.getElementById("authTitle").innerText = isLogin ? "Login" : "Signup";
}

async function auth(){
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const endpoint = isLogin ? "/api/login" : "/api/signup";

try{
const res = await fetch(apo + endpoint,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(res.ok){
localStorage.setItem("user",JSON.stringify(data.user));
alert("✅ Success");
startApp();
}else{
alert(data.message);
}
}catch(e){
alert("❌ Server not reachable");
}
}

/* START */
function startApp(){
document.getElementById("authModal").classList.add("hidden");
document.querySelector(".hero").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");

const user = JSON.parse(localStorage.getItem("user"));
document.getElementById("welcome").innerText = "Welcome " + user.email;
}

/* LOGOUT */
function logout(){
localStorage.removeItem("user");
location.reload();
}

/* TABS */
function tab(t){
document.getElementById("contentTab").classList.add("hidden");
document.getElementById("videoTab").classList.add("hidden");
document.getElementById("shareTab").classList.add("hidden");

document.getElementById(t+"Tab").classList.remove("hidden");
}

/* CONTENT */
async function genContent(){
const topic = document.getElementById("topic").value;
const type = document.getElementById("type").value;

const res = await fetch(apo + "/api/generate-content",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({topic,type})
});

const data = await res.json();
document.getElementById("contentOut").innerText = data.content;
}

/* VIDEO */
async function genVideo(){
const query = document.getElementById("videoTopic").value;

const res = await fetch(apo + "/api/generate-video",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({query})
});

const data = await res.json();

document.getElementById("player").src = data.videoUrl;
document.getElementById("videoSrc").innerText = data.source;
}

/* SHARE */
function getRef(){
const user = JSON.parse(localStorage.getItem("user"));
return window.location.origin + "?ref=" + user.id;
}

function shareWhats(){
window.open(`https://wa.me/?text=Try this AI tool: ${getRef()}`);
}

function shareTele(){
window.open(`https://t.me/share/url?url=${getRef()}`);
}

function copyLink(){
navigator.clipboard.writeText(getRef());
document.getElementById("shareMsg").innerText = "Copied!";
}

/* AUTO LOGIN */
if(localStorage.getItem("user")){
startApp();
}

</script>

</body>
</html>
